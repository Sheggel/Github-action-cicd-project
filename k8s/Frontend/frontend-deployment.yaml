apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: three-tier

spec:
  replicas: 3

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:

      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: frontend
          image: ghcr.io/${{ github.repository }}/jerney-frontend:PLACEHOLDER

          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /
              port: 8080

          livenessProbe:
            httpGet:
              path: /
              port: 8080

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"