apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mongodb
  namespace: three-tier

spec:
  serviceName: mongodb

  replicas: 3

  podManagementPolicy: OrderedReady

  selector:
    matchLabels:
      app: mongodb

  updateStrategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: mongodb

    spec:

      terminationGracePeriodSeconds: 30

      securityContext:
        fsGroup: 999

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - mongodb

              topologyKey: "kubernetes.io/hostname"

      containers:
        - name: mongodb

          image: mongo:7

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 27017
              name: mongodb

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_USERNAME

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_PASSWORD

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"

            limits:
              cpu: "1"
              memory: "2Gi"

          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --eval "db.adminCommand('ping')"

            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --eval "db.adminCommand('ping')"

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6

  volumeClaimTemplates:
    - metadata:
        name: mongodb-storage

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: mongodb-ebs-sc

        resources:
          requests:
            storage: 50Gi