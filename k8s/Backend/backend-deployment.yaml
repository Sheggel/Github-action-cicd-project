apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: three-tier

  labels:
    app: backend

spec:
  replicas: 3

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:

      imagePullSecrets:
        - name: ghcr-secret

      securityContext:
        fsGroup: 1001

      containers:
        - name: backend

          image: ghcr.io/${{ github.repository }}/jerney-backend:PLACEHOLDER
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          env:
            - name: NODE_ENV
              value: "production"

            - name: PORT
              value: "5000"

            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MONGO_URI

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false

          readinessProbe:
            httpGet:
              path: /ready
              port: 5000

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5